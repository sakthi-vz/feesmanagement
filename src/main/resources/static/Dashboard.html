<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMS — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg:        #f4f3ef;
            --surface:   #ffffff;
            --sidebar:   #0f1117;
            --sidebar-t: rgba(255,255,255,0.55);
            --sidebar-a: #ffffff;
            --accent:    #2f52e0;
            --accent-lt: #eef1fd;
            --ink:       #0d0d0d;
            --muted:     #6b6b6b;
            --line:      #e8e6e1;
            --success:   #059669;
            --danger:    #dc2626;
            --warn:      #d97706;
            --info:      #2563eb;
            --radius:    12px;
            --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ────────────────────────────────────────── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            transition: width 0.2s;
        }

        .sidebar-brand {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 28px; height: 28px;
            border-radius: 8px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; color: white; flex-shrink: 0;
        }

        .logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            color: white;
            letter-spacing: -0.02em;
        }

        .sidebar-user {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .user-avatar {
            width: 56px; height: 56px; border-radius: 50%;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 8px; display: block;
        }
        .user-avatar-placeholder {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(47,82,224,0.35); border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: white;
            margin-bottom: 8px;
        }

        .user-role-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(47,82,224,0.15);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .user-name-sidebar {
            font-size: 14px;
            font-weight: 500;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-sub-sidebar {
            font-size: 12px;
            color: var(--sidebar-t);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            padding: 8px 12px 6px;
            margin-top: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--sidebar-t);
            font-size: 13.5px;
            font-weight: 400;
            transition: all 0.15s;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }

        .nav-item.active {
            background: rgba(47,82,224,0.2);
            color: white;
        }

        .nav-icon {
            width: 18px; height: 18px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .btn-logout-sidebar {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            border: none;
            background: none;
            color: rgba(255,255,255,0.4);
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
        }

        .btn-logout-sidebar:hover {
            background: rgba(220,38,38,0.15);
            color: #fca5a5;
        }

        /* ── Main content ────────────────────────────────────── */
        .main-wrap {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--ink);
        }

        .topbar-breadcrumb {
            font-size: 12px;
            color: var(--muted);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-time {
            font-size: 12px;
            color: var(--muted);
        }

        .main-content {
            padding: 32px;
            flex: 1;
        }

        /* ── Page header ─────────────────────────────────────── */
        .page-header {
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--ink);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .page-header p {
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
        }

        /* ── Stats grid ──────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            transition: transform 0.15s;
        }

        .stat-card:hover { transform: translateY(-2px); }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--ink);
            line-height: 1;
        }

        .stat-card.highlight {
            background: var(--accent);
            border-color: var(--accent);
        }

        .stat-card.highlight .stat-label,
        .stat-card.highlight .stat-value { color: white; }

        .stat-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }

        .stat-card.highlight .stat-sub { color: rgba(255,255,255,0.6); }

        /* ── Alert ───────────────────────────────────────────── */
        .alert {
            padding: 14px 18px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .alert.show, .alert[style*="display:block"], .alert[style*="display: block"] { display: block !important; }

        /* ── Features grid ───────────────────────────────────── */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .feature-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .feature-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(47,82,224,0.12);
        }

        .feature-icon {
            width: 44px; height: 44px;
            background: var(--accent-lt);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .feature-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .feature-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            font-weight: 300;
        }

        /* ── Modal ───────────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            max-width: 820px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.2s ease;
            box-shadow: 0 24px 60px rgba(0,0,0,0.2);
        }

        @keyframes modalIn {
            from { opacity:0; transform: translateY(16px) scale(0.98); }
            to   { opacity:1; transform: translateY(0)    scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            background: var(--surface);
            border-radius: 16px 16px 0 0;
            z-index: 1;
        }

        .modal-header h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            font-weight: 400;
            color: var(--ink);
        }

        .btn-close {
            width: 32px; height: 32px;
            border: none; background: var(--bg);
            border-radius: 50%; cursor: pointer;
            font-size: 18px; color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }

        .btn-close:hover { background: #e8e6e1; color: var(--ink); }

        #modalBody { padding: 24px 28px 28px; }

        #modalMessage {
            margin: 0 28px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        /* ── Form ────────────────────────────────────────────── */
        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(47,82,224,0.1);
            background: white;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ── Buttons ─────────────────────────────────────────── */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover:not(:disabled) {
            background: #1a38b0;
            transform: translateY(-1px);
        }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover:not(:disabled) { background: #047857; }

        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover:not(:disabled) { background: #b91c1c; }

        .btn-secondary {
            background: var(--bg);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-secondary:hover:not(:disabled) { background: #e8e6e1; }

        /* ── Table ───────────────────────────────────────────── */
        .table-container { overflow-x: auto; margin-top: 16px; }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .table th {
            background: var(--bg);
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
        }

        .table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            color: var(--ink);
            vertical-align: middle;
        }

        .table tr:last-child td { border-bottom: none; }

        .table tr:hover td { background: var(--bg); }

        /* ── Badges ──────────────────────────────────────────── */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .badge-success  { background: #d1fae5; color: #065f46; }
        .badge-danger   { background: #fee2e2; color: #991b1b; }
        .badge-warning  { background: #fef3c7; color: #92400e; }
        .badge-info     { background: #dbeafe; color: #1e40af; }

        /* ── Messages ────────────────────────────────────────── */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        .message.show { display: block; }
        .message-success { background:#d1fae5; color:#065f46; border-left:3px solid #059669; }
        .message-error   { background:#fee2e2; color:#991b1b; border-left:3px solid #dc2626; }

        .alert-danger  { background:#fee2e2; color:#991b1b; border-left:3px solid #dc2626; }
        .alert-warning { background:#fef3c7; color:#92400e; border-left:3px solid #d97706; }

        /* ── Loading ─────────────────────────────────────────── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px;
            color: var(--muted);
            font-size: 13px;
            gap: 16px;
        }

        .spinner {
            width: 32px; height: 32px;
            border: 2px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Global message toast ────────────────────────────── */
        #globalMessage {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            display: none;
            max-width: 360px;
            animation: toastIn 0.25s ease;
        }

        @keyframes toastIn {
            from { opacity:0; transform: translateY(8px); }
            to   { opacity:1; transform: translateY(0); }
        }

        #globalMessage.show { display: block; }
        #globalMessage.success { background: #065f46; color: white; }
        #globalMessage.error   { background: #991b1b; color: white; }
        #globalMessage.info    { background: var(--accent); color: white; }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .sidebar { width: 0; overflow: hidden; }
            .main-wrap { margin-left: 0; }
            .form-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .features-grid { grid-template-columns: 1fr 1fr; }
            .main-content { padding: 20px; }
        }

        /* ── Extra utility ───────────────────────────────────── */
        .section-divider {
            border: none;
            border-top: 1px solid var(--line);
            margin: 20px 0;
        }

        .info-box {
            background: #eff6ff;
            border-left: 3px solid var(--accent);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #1e40af;
            margin-bottom: 16px;
        }

        /* Dropdown modal list */
        .dropdown-list {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 8px;
        }

        .dropdown-item {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--line);
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: var(--bg); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d1ca; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b0ada6; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">
                <div class="logo-dot">C</div>
                <div class="logo-text">CEMS</div>
            </div>
        </div>

        <div class="sidebar-user">
            <div id="userAvatarWrap">
                <div class="user-avatar-placeholder" id="userAvatarPlaceholder">?</div>
                <img id="userAvatarImg" class="user-avatar" src="" alt="" style="display:none;">
            </div>
            <div class="user-role-badge" id="userRole">Loading...</div>
            <div class="user-name-sidebar" id="userName">Loading...</div>
            <div class="user-sub-sidebar" id="userSub">College Exam System</div>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
            <!-- Populated by JS based on role -->
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout-sidebar" onclick="logout()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign out
            </button>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-wrap">
        <header class="topbar">
            <div>
                <div class="topbar-title" id="topbarTitle">Dashboard</div>
                <div class="topbar-breadcrumb" id="topbarSub">Loading...</div>
            </div>
            <div class="topbar-right">
                <div class="topbar-time" id="topbarTime"></div>
            </div>
        </header>

        <div class="main-content">
            <!-- Welcome header -->
            <div class="page-header">
                <h1 id="welcomeMessage">Welcome</h1>
                <p id="dashboardDescription">Loading your dashboard...</p>
            </div>

            <!-- Eligibility alert -->
            <div id="eligibilityAlert" class="alert alert-danger"></div>

            <!-- Stats -->
            <div id="statsGrid" class="stats-grid" style="display:none;"></div>

            <!-- Feature cards -->
            <div id="featuresGrid" class="features-grid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Title</h3>
                <button class="btn-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalMessage" class="message" style="margin:0 28px 0;"></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Global toast message -->
    <div id="globalMessage"></div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:8080';
        let currentUser = null;

        // ── Security helper: escape all server data before putting into innerHTML ──
        function esc(v) {
            return String(v == null ? '' : v)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
                .replace(/'/g,'&#39;');
        }

        // ── Initialize Dashboard ─────────────────────────────────────────────────
        window.addEventListener('load', () => {
            const savedUser = sessionStorage.getItem('user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            try {
                currentUser = JSON.parse(savedUser);
            } catch(e) {
                sessionStorage.clear();
                window.location.href = 'index.html';
                return;
            }
            // NOTE: for full security, replace this with a /auth/me server call
            // that validates the session token. The current setup trusts sessionStorage
            // which can be modified in DevTools.
            initializeDashboard();
        });

        // Initialize Dashboard
        async function initializeDashboard() {
            const name = currentUser.name || currentUser.username || 'User';
            document.getElementById('userName').textContent = name;
            document.getElementById('userRole').textContent = currentUser.role;

            // Set avatar — use photo if available, else first letter
            if (currentUser.photoPath) {
                const filename = currentUser.photoPath.split(/[\/\\]/).pop();
                const img = document.getElementById('userAvatarImg');
                const ph  = document.getElementById('userAvatarPlaceholder');
                img.src = API_BASE_URL + '/photos/view/' + filename;
                img.onload = () => { img.style.display='block'; ph.style.display='none'; };
                img.onerror = () => { img.style.display='none'; ph.style.display='flex'; };
            } else {
                document.getElementById('userAvatarPlaceholder').textContent = name.charAt(0).toUpperCase();
            }

        async function loadPaymentStatus() {
            if (!currentUser.deptId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/departments/${currentUser.deptId}/payment-status`);
                if (res.ok) {
                    const data = await res.json();
                    const desc = document.getElementById('paymentToggleDesc');
                    const card = document.getElementById('paymentToggleCard');
                    if (data.paymentEnabled) {
                        desc.textContent = '🟢 Payment is ENABLED for students';
                        card.style.borderColor = '#28a745';
                        card.style.border = '2px solid #28a745';
                    } else {
                        desc.textContent = '🔴 Payment is DISABLED — click to enable';
                        card.style.border = '2px solid #dc3545';
                    }
                }
            } catch(e) { console.error(e); }
        }

        async function showPaymentToggle() {
            if (!currentUser.deptId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/departments/${currentUser.deptId}/payment-status`);
                const data = await res.json();
                const isEnabled = data.paymentEnabled;

                openModal('Student Payment Control', `
                    <div style="text-align:center;padding:20px 0;">
                        <div style="font-size:60px;margin-bottom:20px;">${isEnabled ? '🟢' : '🔴'}</div>
                        <h3 style="margin-bottom:10px;">Payment is currently <strong>${isEnabled ? 'ENABLED' : 'DISABLED'}</strong></h3>
                        <p style="color:#666;margin-bottom:30px;">
                            ${isEnabled
                                ? 'Students can currently see and pay their examination fees.'
                                : 'Students cannot see payment option until you enable it.'}
                        </p>
                        <button class="btn ${isEnabled ? 'btn-danger' : 'btn-success'}" 
                            style="font-size:16px;padding:14px 40px;"
                            onclick="togglePayment(${!isEnabled})">
                            ${isEnabled ? '🔴 Disable Payment' : '🟢 Enable Payment for Students'}
                        </button>
                    </div>
                `);
            } catch(e) {
                showMessage('Error loading payment status', 'error');
            }
        }

        async function togglePayment(enable) {
            try {
                const res = await fetch(`${API_BASE_URL}/departments/${currentUser.deptId}/payment-toggle`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: enable })
                });
                if (res.ok) {
                    showMessage(`Payment ${enable ? 'ENABLED' : 'DISABLED'} for students successfully!`, 'success');
                    closeModal();
                    loadPaymentStatus();
                } else {
                    showMessage('Failed to update payment status', 'error');
                }
            } catch(e) {
                showMessage('Error: ' + e.message, 'error');
            }
        }

                    const students = await response.json();
                    const eligible = students.filter(s => s.eligibilityStatus === 'ELIGIBLE').length;

                    const statsGrid = document.getElementById('statsGrid');
                    statsGrid.style.display = 'grid';
                    statsGrid.innerHTML = `

        function showMessage(message, type = 'success') {
            // Update modal message if modal is open
            const msgEl = document.getElementById('modalMessage');
            if (msgEl) {
                msgEl.textContent = message;
                msgEl.className = `message message-${type} show`;
            }
            // Also show toast
            const toast = document.getElementById('globalMessage');
            if (toast) {
                toast.textContent = message;
                toast.className = `show ${type}`;
                clearTimeout(window._toastTimer);
                window._toastTimer = setTimeout(() => { toast.className = ''; }, 4000);
            }
        }

        function hideMessage() {
            const msgEl = document.getElementById('modalMessage');
            if (msgEl) msgEl.className = 'message';

        async function viewPaidStudents() {
            openModal('Paid Students', '<div class="loading"><div class="spinner"></div>Loading...</div>');
            try {
                const studRes = await fetch(`${API_BASE_URL}/students/all`);
                const allStudents = studRes.ok ? await studRes.json() : [];
                const students = allStudents.filter(s => s.programmeStatus !== 'COMPLETED');

                if (students.length === 0) {
                    renderStudentDropdownModal([], 'Paid Students', 'success'); return;
                }

                // Query per dept+semester combination — each student checked against their OWN semester
                const deptSemPairs = [...new Set(
                    students.filter(s => s.department?.deptId && s.currentSemester)
                            .map(s => `${s.department.deptId}:${s.currentSemester}`)
                )];

                const paidSet = new Set();
                await Promise.all(deptSemPairs.map(async pair => {
                    const [dId, sem] = pair.split(':');
                    try {
                        const r = await fetch(`${API_BASE_URL}/payments/dept/${dId}/paid-student-ids?semester=${sem}`);
                        if (r.ok) (await r.json()).forEach(id => paidSet.add(Number(id)));
                    } catch(e) {}
                }));

                const paid = students.filter(s => paidSet.has(Number(s.studentId)));
                renderStudentDropdownModal(paid, `Paid Students (current semester)`, 'success');
            } catch(e) { showMessage('Error: ' + e.message, 'error'); }
        }

        async function doPromoteAll() {
            const sem = document.getElementById('promoteAllSem')?.value;
            if (!sem) { showMessage('Please select a semester', 'error'); return; }

            const btn = document.getElementById('promoteAllBtn');
            btn.disabled = true; btn.textContent = 'Promoting…';

            try {
                const deptRes = await fetch(`${API_BASE_URL}/departments/all`);
                if (!deptRes.ok) throw new Error('Failed to load departments');
                const depts = await deptRes.json();

                const results = [];
                for (const dept of depts) {
                    try {
                        const r = await fetch(`${API_BASE_URL}/students/promote`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ deptId: dept.deptId, currentSemester: parseInt(sem) })
                        });
                        const data = await r.json();
                        results.push({ dept: dept.deptName, ok: r.ok, data });
                    } catch(e) {
                        results.push({ dept: dept.deptName, ok: false, data: { error: e.message } });
                    }
                }

                const resultHtml = results.map(r => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);">
                        <span style="font-size:13px;font-weight:500;">${esc(r.dept)}</span>
                        <span class="badge badge-${r.ok?'success':'warning'}">${r.ok ? (r.data.studentsPromoted||0)+' promoted'+(r.data.studentsGraduated?', '+r.data.studentsGraduated+' graduated':'') : r.data.error||'no eligible students'}</span>
                    </div>`).join('');

                document.getElementById('promoteAllResults').innerHTML = `
                    <div style="border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:16px;">
                        <div style="padding:10px 14px;background:var(--bg);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);">Results</div>
                        ${resultHtml}
                    </div>`;

                showMessage(`Promotion complete for ${results.length} departments`, 'success');
                loadAdminStats(); // Refresh stats

            } catch(e) {
                showMessage('Error: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Promote All Departments';
            }
        }

                            `${API_BASE_URL}/payments/dept/${deptId}/paid-student-ids?semester=${sem}`
                        );
                        if (res.ok) {
                            const ids = await res.json();
                            ids.forEach(id => paidSet.add(Number(id)));
                        }
                    } catch(e) {}
                }));

                displayStudentsTable(students, paidSet);

            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function displayStudentsTable(students, paidStudentIds) {
            const activeStudents = (students || []).filter(s => s.programmeStatus !== 'COMPLETED');

            if (activeStudents.length === 0) {
                document.getElementById('studentsTableWrap').innerHTML = `
                    <div style="text-align:center;padding:40px 20px;color:#64748b;">
                        <div style="font-size:40px;margin-bottom:12px;">&#128101;</div>
                        <p style="font-size:15px;font-weight:600;">No active students found</p>
                    </div>`;
                return;
            }

            // paidSet uses p.semester from ExamFeePayment — stamped at payment time.
            // Mohamed paid Sem 2 → p.semester=2. Querying Sem 3 returns nothing for him. Accurate.
            const paidSet = paidStudentIds instanceof Set
                ? paidStudentIds
                : paidStudentIds instanceof Map
                    ? new Set([...paidStudentIds.entries()]
                        .filter(([id, sem]) => {
                            const s = activeStudents.find(st => Number(st.studentId) === id);
                            return s && s.currentSemester === sem;
                        })
                        .map(([id]) => id))
                    : new Set((paidStudentIds || []).map(Number));

            const rows = activeStudents.map(s => {
                const paid     = paidSet.has(Number(s.studentId));
                const att      = s.attendancePercentage != null ? s.attendancePercentage : 0;
                const attColor = att >= 75 ? '#15803d' : '#dc2626';
                return `
                    <tr>
                        <td style="font-weight:600;">${esc(s.name)}</td>
                        <td style="font-size:12px;color:#64748b;">${esc(s.rollNo)}</td>
                        <td>${s.department?.deptName || 'N/A'}</td>
                        <td style="text-align:center;">
                            <span style="background:#e0e7ff;color:#3730a3;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;">
                                Sem ${s.currentSemester || '&mdash;'}
                            </span>
                        </td>
                        <td style="font-weight:600;color:${attColor};">${att}%</td>
                        <td style="text-align:center;">
                            <span class="badge ${paid ? 'badge-success' : 'badge-warning'}">
                                ${paid ? 'Paid' : 'Unpaid'}
                            </span>
                        </td>
                    </tr>`;
            }).join('');

            document.getElementById('studentsTableWrap').innerHTML = `
                <div class="table-container" style="margin-top:12px;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Roll No</th>
                                <th>Department</th>
                                <th style="text-align:center;">Semester</th>
                                <th>Attendance</th>
                                <th style="text-align:center;">Fee Status</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                <div style="margin-top:8px;font-size:12px;color:#94a3b8;text-align:right;">
                    ${activeStudents.length} student${activeStudents.length !== 1 ? 's' : ''}
                </div>`;
        }

            if (mode === 'all') {

        async function loadDeptStudents(mode) {
            const wrap = document.getElementById('studentsTableWrap');
            if (wrap) wrap.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

            try {
                const sem = document.getElementById('semesterPicker')?.value;
                const studUrl = mode === 'semester'
                    ? `${API_BASE_URL}/students/dept/${currentUser.deptId}/semester/${sem}`
                    : `${API_BASE_URL}/students/dept/${currentUser.deptId}`;

                const studRes = await fetch(studUrl);
                if (!studRes.ok) { showMessage('Failed to load students', 'error'); return; }
                const students = await studRes.json();

                if (students.length === 0) { displayStudentsTable([], new Set()); return; }

                // Each semester is queried separately — backend uses p.semester tag
                // so only students who paid FOR THIS SPECIFIC SEMESTER are returned
                const semesters = [...new Set(students.map(s => s.currentSemester).filter(Boolean))];
                const paidSet = new Set();

                await Promise.all(semesters.map(async (sem) => {
                    try {
                        const res = await fetch(
                            `${API_BASE_URL}/payments/dept/${currentUser.deptId}/paid-student-ids?semester=${sem}`
                        );
                        if (res.ok) {
                            const ids = await res.json();
                            ids.forEach(id => paidSet.add(Number(id)));
                        }
                    } catch(e) {}
                }));

                displayStudentsTable(students, paidSet);

            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function updateSingleAttendance(studentId) {
            const attendance = document.getElementById(`att-${studentId}`).value;
            if (!attendance) { showMessage('Enter attendance value', 'error'); return; }

            try {
                const response = await fetch(`${API_BASE_URL}/students/${studentId}/attendance`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ attendancePercentage: parseFloat(attendance) })
                });

                if (response.ok) {
                    const student = await response.json();
                    const statusEl = document.getElementById(`status-${studentId}`);
                    statusEl.textContent = student.eligibilityStatus;
                    statusEl.className = `badge ${student.eligibilityStatus === 'ELIGIBLE' ? 'badge-success' : 'badge-danger'}`;
                    showMessage(`Updated! ${student.name} → ${student.eligibilityStatus}`, 'success');
                } else {
                    showMessage('Failed to update', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function updateAllAttendance(studentIds) {
            showMessage('Updating all students...', 'success');
            let successCount = 0;

            for (const studentId of studentIds) {
                const attendanceEl = document.getElementById(`att-${studentId}`);
                if (!attendanceEl) continue;
                const attendance = attendanceEl.value;

                try {
                    const response = await fetch(`${API_BASE_URL}/students/${studentId}/attendance`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ attendancePercentage: parseFloat(attendance) })
                    });

                    if (response.ok) {
                        const student = await response.json();
                        const statusEl = document.getElementById(`status-${studentId}`);
                        if (statusEl) {
                            statusEl.textContent = student.eligibilityStatus;
                            statusEl.className = `badge ${student.eligibilityStatus === 'ELIGIBLE' ? 'badge-success' : 'badge-danger'}`;
                        }
                        successCount++;
                    }
                } catch (e) { console.error(e); }
            }

            showMessage(`${successCount} students updated successfully!`, 'success');
        }

        async function addExtraSubject() {
            const code = document.getElementById('extraSubjectCode').value.trim();
            if (!code) { showMessage('Enter a subject code', 'error'); return; }

            try {
                const response = await fetch(`${API_BASE_URL}/subjects/dept/${currentUser.deptId}/semester/1`);
                const allSubjects = await fetch(`${API_BASE_URL}/subjects/all`).then(r => r.json());
                const found = allSubjects.find(s => s.subjectCode === code || String(s.subjectId) === code);

                if (!found) { showMessage(`Subject code "${code}" not found`, 'error'); return; }
                if (window._extraSubjects.find(s => s.subjectId === found.subjectId)) {
                    showMessage('Subject already added', 'error'); return;

        async function searchArrearSubject(query) {
            const suggestionsEl = document.getElementById('arrearSuggestions');
            if (!query || query.length < 2) { suggestionsEl.style.display = 'none'; return; }

            try {
                const res = await fetch(`${API_BASE_URL}/subjects/all`);
                const allSubjects = await res.json();
                const filtered = allSubjects.filter(s =>
                    (s.subjectCode && s.subjectCode.toLowerCase().includes(query.toLowerCase())) ||
                    s.name.toLowerCase().includes(query.toLowerCase())
                ).slice(0, 8);

                if (filtered.length === 0) { suggestionsEl.style.display = 'none'; return; }

                suggestionsEl.innerHTML = filtered.map((s, idx) => `
                    <div data-subject-idx="${idx}"
                        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;"
                        onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">
                        <span style="font-family:monospace;font-size:11px;background:#e8f0fe;color:#1a56db;padding:2px 8px;border-radius:4px;white-space:nowrap;">${esc(s.subjectCode || s.subjectId)}</span>
                        <span style="font-size:13px;flex:1;">${esc(s.name)}</span>
                        <span style="font-size:12px;color:#28a745;font-weight:600;">₹${s.fee}</span>
                    </div>
                `).join('');
                // Store the filtered list so click handler can look up by index
                window._arrearSearchResults = filtered;
                // Wire clicks via delegation — avoids any inline JS with dynamic data
                suggestionsEl.querySelectorAll('[data-subject-idx]').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.getAttribute('data-subject-idx'), 10);
                        selectArrearSubject(window._arrearSearchResults[idx]);
                    });
                });
                suggestionsEl.style.display = 'block';
            } catch(e) { console.error(e); }
        }

        async function submitArrear() {
            const subject = window._selectedArrearSubject;
            if (!subject) { showMessage('Please search and select a subject first', 'error'); return; }
            if (!subject.subjectId) { showMessage('Invalid subject selected — no ID found', 'error'); return; }

            const btn = document.querySelector('#modal button.btn-primary');
            if (btn) { btn.disabled = true; btn.textContent = 'Registering…'; }

            try {
                const response = await fetch(`${API_BASE_URL}/exam-registration/arrear`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentId: currentUser.studentId,
                        subjectId: subject.subjectId
                    })
                });

                if (response.ok) {
                    showMessage('Arrear registered: ' + subject.name + ' (₹' + subject.fee + ')', 'success');
                    window._selectedArrearSubject = null;
                    const inp = document.getElementById('arrearCodeInput');
                    const sug = document.getElementById('arrearSuggestions');
                    const sel = document.getElementById('selectedArrearSubject');
                    if (inp) inp.value = '';

                    if (sel) sel.innerHTML = '<div style="background:#d1fae5;padding:12px 16px;border-radius:8px;font-size:13px;color:#065f46;font-weight:500;">✓ ' + subject.name + ' registered. Search to add another.</div>';
                } else {
                    const err = await response.json().catch(() => ({}));
                    showMessage(err.error || 'Failed to register arrear subject', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = 'Register Arrear Subject'; }
            }
        }

        async function removeArrear(regId) {
            // Show inline confirm instead of browser confirm()
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML = `
                <div style="background:var(--surface);border-radius:16px;padding:32px 36px;width:100%;max-width:360px;margin:20px;box-shadow:0 24px 60px rgba(0,0,0,0.2);text-align:center;">
                    <div style="width:48px;height:48px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                    </div>
                    <p style="font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:8px;">Remove arrear subject?</p>
                    <p style="font-size:13px;color:var(--muted);font-weight:300;margin-bottom:24px;">This will delete the registration. You can re-add it later.</p>
                    <div style="display:flex;gap:10px;">
                        <button id="cancelRemove" style="flex:1;padding:11px;border:1px solid var(--line);background:var(--bg);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;">Cancel</button>
                        <button id="confirmRemove" style="flex:1;padding:11px;border:none;background:#dc2626;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:white;cursor:pointer;">Remove</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);

            await new Promise(resolve => {
                overlay.querySelector('#cancelRemove').onclick  = () => { document.body.removeChild(overlay); resolve(false); };
                overlay.querySelector('#confirmRemove').onclick = () => { document.body.removeChild(overlay); resolve(true); };
            }).then(async confirmed => {
                if (!confirmed) return;
                try {
                    const res = await fetch(`${API_BASE_URL}/exam-registration/${regId}?ownerStudentId=${currentUser.studentId}`, { method: 'DELETE' });
                    if (res.ok) {
                        showMessage('Arrear subject removed', 'success');

                    } else {
                        showMessage('Failed to remove', 'error');
                    }
                } catch(e) {
                    showMessage('Error: ' + e.message, 'error');
                }
            });
        }

        function validateTxnId(input) {
            const hint = document.getElementById('txnIdHint');
            const val  = input.value.trim();
            if (!val) {
                input.style.borderColor = '#e2e8f0';
                if (hint) hint.textContent = 'Enter the UTR / Transaction ID from GPay, PhonePe, or Paytm';
                if (hint) hint.style.color = '#94a3b8';
            } else if (val.length < 6) {
                input.style.borderColor = '#ef4444';
                if (hint) { hint.textContent = 'Transaction ID too short'; hint.style.color = '#ef4444'; }
            } else {
                input.style.borderColor = '#10b981';
                if (hint) { hint.textContent = '✓ Transaction ID looks valid'; hint.style.color = '#10b981'; }
            }
        }

        async function processPayment() {
            const txnInput = document.getElementById('transactionId');
            const transactionId = txnInput ? txnInput.value.trim() : '';

            if (!transactionId || transactionId.length < 6) {
                // Highlight the field
                if (txnInput) {
                    txnInput.style.borderColor = '#ef4444';
                    txnInput.focus();
                }
                const hint = document.getElementById('txnIdHint');
                if (hint) { hint.textContent = '⚠ Transaction ID is required before paying'; hint.style.color = '#ef4444'; }
                showMessage('Please enter your Transaction ID / UTR number before submitting.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/payments/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentId: currentUser.studentId,
                        transactionId
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    showMessage(
                        `Payment successful! Receipt No: ${result.receiptNo}`,
                        'success'
                    );
                    setTimeout(() => {
                        viewMyReceipts();
                    }, 2000);
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Payment failed', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function buildHallTicketRows(students) {
            if (!students.length) return '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:20px;">No students found</td></tr>';
            return students.map(s => {
                const eligible  = s.eligibilityStatus === 'ELIGIBLE';
                const att       = s.attendancePercentage != null ? s.attendancePercentage : 0;
                const deptName  = s.department?.deptName || '—';
                const sem       = s.currentSemester || '—';
                const attColor  = eligible ? '#15803d' : '#dc2626';
                const attBg     = eligible ? '#f0fdf4' : '#fef2f2';

                return `<tr>
                    <td style="font-family:monospace;font-size:12px;">${esc(s.rollNo)}</td>
                    <td style="font-weight:600;">${esc(s.name)}</td>
                    <td style="font-size:12px;color:#64748b;">${esc(deptName)}</td>
                    <td style="text-align:center;">${sem}</td>
                    <td style="text-align:center;">
                        <span style="background:${attBg};color:${attColor};padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600;">
                            ${att}%
                        </span>
                    </td>
                    <td style="text-align:center;" id="feestatus-${s.studentId}">
                        <span style="color:#94a3b8;font-size:12px;">—</span>
                    </td>
                    <td style="text-align:center;">
                        <button onclick="generateOneHallTicket(${s.studentId}, '${esc(s.rollNo)}')"
                            style="padding:5px 12px;background:#2f52e0;color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">
                            ⬇ Generate
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function filterHallTicketStudents() {
            const deptId = document.getElementById('htDeptFilter')?.value || '';
            const search = (document.getElementById('htSearch')?.value || '').toLowerCase().trim();
            let filtered = window._htStudents || [];
            if (deptId)  filtered = filtered.filter(s => String(s.department?.deptId) === deptId);
            if (search)  filtered = filtered.filter(s =>
                s.name?.toLowerCase().includes(search) || s.rollNo?.toLowerCase().includes(search));
            const tbody = document.getElementById('htTableBody');
            if (tbody) tbody.innerHTML = buildHallTicketRows(filtered);
        }

            if (file.size > 2*1024*1024) { alert('File must be under 2MB'); input.value=''; return; }

            reader.onload = e => {
                document.getElementById('profileAvatarWrap').innerHTML =

            reader.readAsDataURL(file);

            else if (role === 'HOD')             url = `${API_BASE_URL}/profile/hod/${id}/photo`;
            else if (role === 'ADMIN')           url = `${API_BASE_URL}/profile/admin/${id}/photo`;
            else if (role === 'EXAM_CONTROLLER') url = `${API_BASE_URL}/profile/exam-controller/${id}/photo`;
            const fd = new FormData(); fd.append('photo', file);
            try {
                const res = await fetch(url, { method:'POST', body:fd });
                const data = await res.json();
                if (data.success) {
                    showProfileMsg('✓ Photo uploaded successfully!', 'success');
                } else { showProfileMsg(data.error || 'Upload failed', 'error'); }
            } catch(e) { showProfileMsg('Upload error: ' + e.message, 'error'); }
        }

        async function saveProfileSettings(id) {
            const role = window._profileRole;
            const body = {
                name:  document.getElementById('pName')?.value.trim(),
                phone: document.getElementById('pPhone')?.value.trim(),
                dateOfBirth: document.getElementById('pDob')?.value,
            };
            const desEl = document.getElementById('pDesignation');
            if (desEl) body.designation = desEl.value.trim();

            let url;
            if      (role === 'STUDENT')        url = `${API_BASE_URL}/profile/student/${id}`;
            else if (role === 'HOD')             url = `${API_BASE_URL}/profile/hod/${id}`;
            else if (role === 'ADMIN')           url = `${API_BASE_URL}/profile/admin/${id}`;
            else if (role === 'EXAM_CONTROLLER') url = `${API_BASE_URL}/profile/exam-controller/${id}`;

            try {
                const res  = await fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                const data = await res.json();
                if (data.success) {
                    showProfileMsg('✓ Profile updated successfully!', 'success');
                    // Update session name
                    if (body.name) {
                        currentUser.name = body.name;
                        sessionStorage.setItem('user', JSON.stringify(currentUser));
                        const nameEl = document.getElementById('sidebarUserName');
                        if (nameEl) nameEl.textContent = body.name;
                    }
                } else { showProfileMsg(data.error || 'Update failed', 'error'); }
            } catch(e) { showProfileMsg('Error: ' + e.message, 'error'); }
        }

        function showProfileMsg(msg, type) {
            const el = document.getElementById('profileUpdateMsg');
            if (!el) return;
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = type === 'success' ? '#f0fdf4' : '#fef2f2';
            el.style.color      = type === 'success' ? '#15803d'  : '#dc2626';
            el.style.border     = type === 'success' ? '1px solid #bbf7d0' : '1px solid #fecaca';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function openAdminPanel() {
            window.open('Adminpanel.html', '_blank');
        }

        function formatDob(dob) {
            if (!dob) return '—';
            try {
                const d = new Date(dob);
                return d.toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' });
            } catch { return dob; }
        }

        function logout() {
            document.getElementById('logoutOverlay').style.display = 'flex';
        }

        function cancelLogout() {
            document.getElementById('logoutOverlay').style.display = 'none';
        }

        function confirmLogout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>

    <!-- Logout confirmation overlay -->
    <div id="logoutOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:var(--surface);border-radius:16px;padding:36px 40px;width:100%;max-width:380px;margin:20px;box-shadow:0 24px 60px rgba(0,0,0,0.2);text-align:center;">
            <div style="width:52px;height:52px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
            <p style="font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--ink);margin-bottom:8px;">Sign out?</p>
            <p style="font-size:13px;color:var(--muted);font-weight:300;margin-bottom:28px;">You will be returned to the login page.</p>
            <div style="display:flex;gap:10px;">
                <button onclick="cancelLogout()"
                    style="flex:1;padding:12px;border:1px solid var(--line);background:var(--bg);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;">
                    Stay
                </button>
                <button onclick="confirmLogout()"
                    style="flex:1;padding:12px;border:none;background:#dc2626;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:white;cursor:pointer;">
                    Sign out
                </button>
            </div>
        </div>
    </div>
</body>
</html>
